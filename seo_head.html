<!-- 
====================================================================
  SEO & META-DATEN FÜR DREHMOMENT DIGITAL
  Diesen Block einfach in deiner HTML-Datei direkt zwischen 
  <head> und </head> einfügen!
==================================================================== 
-->

<!-- Standard Zeichencodierung und Viewport für Handys -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 1. Der allerwichtigste Teil: Der Titel -->
<title>Drehmoment Digital | Moderne Websites für KFZ & Handwerk in NRW</title>

<!-- 2. Meta-Description (Das was bei Google als kurzer Text unter dem Link steht) -->
<meta name="description" content="Wir bauen Websites, die Kunden bringen. Speziell für KFZ-Werkstätten und lokale Handwerksbetriebe in NRW. Bodenständig, direkt und professionell. Kostenlose Demo anfragen!">

<!-- 3. Keywords (Werden heute weniger beachtet, aber schaden nicht) -->
<meta name="keywords" content="Webagentur NRW, Website KFZ Werkstatt, Webdesign Handwerk, Homepage Autohaus, Drehmoment Digital, Webdesigner NRW">

<!-- 4. Autor & Sprache -->
<meta name="author" content="Drehmoment Digital">
<meta name="language" content="German">

<!-- 5. Open Graph / Social Media Tags (Wenn jemand deinen Link z.B. bei WhatsApp oder Facebook postet) -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://drehmoment-digital.de/">
<meta property="og:title" content="Websites, die wie ein frisch überholter Motor laufen.">
<meta property="og:description" content="Spezialisiert auf KFZ-Werkstätten und Handwerk in NRW. Wir bauen keine Standard-Seiten, wir bauen digitale Kundenmagneten.">
<!-- Hier später den Link zu deinem Vorschaubild (z.B. Logo oder rohes Werkstatt-Mockup) einfügen -->
<meta property="og:image" content="https://drehmoment-digital.de/assets/og-preview.jpg">

<!-- Google Fonts (Beispiel für eine fette, mechanische Schriftart - falls du sie nutzt) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<!-- 
====================================================================
  ENDE SEO & META-DATEN 
====================================================================
